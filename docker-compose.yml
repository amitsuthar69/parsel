services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parsel
      POSTGRES_PASSWORD: parsel
      POSTGRES_DB: parsel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parsel -d parsel"]
      interval: 2s
      timeout: 5s
      retries: 10

  agent:
    build: .
    image: parsel:local
    command: ["/usr/local/bin/agent"]
    environment:
      REDIS_ADDR: redis:6379
      LOG_DIR: /logs
      NODE_NAME: compose-agent
      STREAM_NAME: parsel:logs
    volumes:
      - ./logs:/logs
    depends_on:
      - redis

  dbwriter:
    image: parsel:local
    command: ["/usr/local/bin/dbwriter"]
    environment:
      REDIS_ADDR: redis:6379
      NODE_NAME: compose-dbwriter
      STREAM_NAME: parsel:logs
      DATABASE_URL: postgres://parsel:parsel@postgres:5432/parsel
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  alerter:
    image: parsel:local
    command: ["/usr/local/bin/alerter"]
    environment:
      REDIS_ADDR: redis:6379
      NODE_NAME: compose-alerter
      STREAM_NAME: parsel:logs
      WEBHOOK_URL: ${WEBHOOK_URL}
    depends_on:
      - redis

  wsgateway:
    image: parsel:local
    command: ["/usr/local/bin/wsgateway"]
    environment:
      REDIS_ADDR: redis:6379
      WS_ADDR: :8080
      NODE_NAME: compose-ws
      STREAM_NAME: parsel:logs
    ports:
      - "8080:8080"
    depends_on:
      - redis

  api:
    image: parsel:local
    command: ["/usr/local/bin/api"]
    working_dir: /app
    environment:
      DATABASE_URL: postgres://parsel:parsel@postgres:5432/parsel
      API_ADDR: :3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  producer:
    image: parsel:local
    command: ["/usr/local/bin/producer"]
    environment:
      LOG_DIR: /logs
    volumes:
      - ./logs:/logs
