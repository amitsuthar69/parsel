<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Parsel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'Fira Mono', monospace;
    background: #0d0d0d;
    color: #e2e2e2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 10px 16px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: #111;
  }

  .logo { font-size: 13px; color: #4a9eff; letter-spacing: .04em; }
  .logo span { color: #555; }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    gap: 1px;
    background: #222;
    min-height: 0;
  }

  .panel {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-head {
    padding: 9px 14px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: #111;
  }

  .panel-title { font-size: 10px; color: #555; letter-spacing: .1em; text-transform: uppercase; }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .dot.on  { background: #22c55e; }
  .dot.err { background: #ff4d4d; }

  #ws-label { font-size: 10px; color: #444; margin-left: auto; }

  /* live feed */
  #live-feed {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    min-height: 0;
    font-size: 11px;
    line-height: 1.7;
  }

  .log-line {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 1px 0;
  }
  .log-line:hover { background: #111; }

  /* query panel */
  .filters {
    padding: 10px 14px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
    background: #111;
  }

  .row { display: flex; gap: 6px; }

  select, input[type=datetime-local] {
    background: #0d0d0d;
    border: 1px solid #222;
    color: #e2e2e2;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 4px;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  select:focus, input:focus { border-color: #4a9eff; }

  button {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #aaa;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    flex: 1;
  }
  button:hover { background: #222; color: #e2e2e2; }
  button:disabled { opacity: .3; cursor: default; }

  button.primary {
    background: #4a9eff;
    color: #000;
    border-color: #4a9eff;
    font-weight: 600;
  }
  button.primary:hover { opacity: .85; }

  .results-area { flex: 1; overflow-y: auto; min-height: 0; }

  .results-inner {
    padding: 10px 14px;
    font-size: 11px;
    line-height: 1.7;
  }

  .result-line {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 2px 0;
    border-bottom: 1px solid #151515;
  }
  .result-line:last-child { border-bottom: none; }
  .result-line:hover { background: #111; }

  .ts   { color: #444; white-space: nowrap; flex-shrink: 0; }
  .svc  { color: #666; min-width: 64px; flex-shrink: 0; }
  .msg  { color: #ccc; word-break: break-all; }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    min-width: 40px;
    text-align: center;
    letter-spacing: .04em;
  }
  .INFO  { background: #4a9eff18; color: #4a9eff; }
  .WARN  { background: #f0a50018; color: #f0a500; }
  .ERROR { background: #ff4d4d18; color: #ff4d4d; }
  .FATAL { background: #cc00ff18; color: #cc00ff; }
  .DEBUG { background: #33333318; color: #666; }

  .empty {
    padding: 24px 14px;
    font-size: 11px;
    color: #444;
  }

  .pag {
    padding: 8px 14px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: #555;
    flex-shrink: 0;
    background: #111;
  }
  .pag-btns { display: flex; gap: 6px; }
  .pag-btns button { flex: none; padding: 3px 10px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">parsel <span>/ log dashboard</span></div>
  <div id="ws-label">connecting</div>
  <div class="dot" id="ws-dot"></div>
</header>

<div class="main">

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Live tail</div>
    </div>
    <div id="live-feed"></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Query logs</div>
    </div>

    <div class="filters">
      <div class="row">
        <select id="f-service"><option value="">all services</option></select>
        <select id="f-level">
          <option value="">all levels</option>
          <option>INFO</option>
          <option>WARN</option>
          <option>ERROR</option>
          <option>FATAL</option>
          <option>DEBUG</option>
        </select>
      </div>
      <div class="row">
        <input type="datetime-local" id="f-from" />
        <input type="datetime-local" id="f-to" />
      </div>
      <div class="row">
        <button class="primary" onclick="doSearch(0)">search</button>
        <button onclick="clearAll()">clear</button>
      </div>
    </div>

    <div class="results-area">
      <div class="empty" id="empty-msg">run a search to see historical logs.</div>
      <div id="results-inner" class="results-inner" style="display:none"></div>
    </div>

    <div class="pag" id="pag" style="display:none">
      <span id="pag-info"></span>
      <div class="pag-btns">
        <button id="btn-prev" onclick="prevPage()">← prev</button>
        <button id="btn-next" onclick="nextPage()">next →</button>
      </div>
    </div>
  </div>

</div>

<script>
  const LIMIT = 50;
  let offset = 0;

  const feed   = document.getElementById('live-feed');
  const wsDot  = document.getElementById('ws-dot');
  const wsLbl  = document.getElementById('ws-label');

  function escHTML(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtTime(ts) {
    try { return new Date(ts).toLocaleTimeString('en-US',{hour12:false}); } catch { return ts; }
  }

  function makeLine(ts, lvl, svc, msg, cls) {
    const l = (lvl||'INFO').toUpperCase();
    return `<div class="${cls}">
      <span class="ts">${fmtTime(ts)}</span>
      <span class="badge ${l}">${l}</span>
      <span class="svc">${escHTML(svc)}</span>
      <span class="msg">${escHTML(msg)}</span>
    </div>`;
  }

  // websocket
  function connectWS() {
    const ws = new WebSocket('ws://'+location.hostname+':8080/ws');
    ws.onopen  = () => { wsDot.className='dot on'; wsLbl.textContent='live'; };
    ws.onclose = () => { wsDot.className='dot err'; wsLbl.textContent='disconnected'; setTimeout(connectWS,3000); };
    ws.onerror = () => { wsDot.className='dot err'; wsLbl.textContent='error'; };
    ws.onmessage = (evt) => {
      try {
        const e = JSON.parse(evt.data);
        feed.insertAdjacentHTML('beforeend', makeLine(e.timestamp, e.level, e.service, e.message, 'log-line'));
        while(feed.children.length > 250) feed.removeChild(feed.firstChild);
        feed.scrollTop = feed.scrollHeight;
      } catch {}
    };
  }
  connectWS();

  // services dropdown
  fetch('/api/services').then(r=>r.json()).then(svcs=>{
    const sel = document.getElementById('f-service');
    svcs.forEach(s => {
      const o = document.createElement('option');
      o.value = o.textContent = s;
      sel.appendChild(o);
    });
  }).catch(()=>{});

  // search
  async function doSearch(off) {
    offset = off;
    const params = new URLSearchParams({ limit: LIMIT, offset });
    const svc  = document.getElementById('f-service').value;
    const lvl  = document.getElementById('f-level').value;
    const from = document.getElementById('f-from').value;
    const to   = document.getElementById('f-to').value;
    if (svc)  params.set('service', svc);
    if (lvl)  params.set('level',   lvl);
    if (from) params.set('from', new Date(from).toISOString());
    if (to)   params.set('to',   new Date(to).toISOString());

    try {
      const res  = await fetch('/api/logs?' + params);
      const logs = await res.json();
      renderResults(logs);
    } catch {
      document.getElementById('empty-msg').textContent = 'failed to fetch logs.';
    }
  }

  function renderResults(logs) {
    const inner = document.getElementById('results-inner');
    const empty = document.getElementById('empty-msg');
    const pag   = document.getElementById('pag');

    if (!logs || logs.length === 0) {
      inner.style.display = 'none';
      empty.textContent   = 'no logs found.';
      empty.style.display = 'block';
      pag.style.display   = 'none';
      return;
    }

    empty.style.display = 'none';
    inner.style.display = 'block';
    pag.style.display   = 'flex';
    inner.innerHTML = logs.map(r => makeLine(r.timestamp, r.level, r.service, r.message, 'result-line')).join('');

    document.getElementById('pag-info').textContent = `page ${Math.floor(offset/LIMIT)+1} · ${logs.length} rows`;
    document.getElementById('btn-prev').disabled = offset === 0;
    document.getElementById('btn-next').disabled = logs.length < LIMIT;
  }

  function prevPage() { if (offset >= LIMIT) doSearch(offset - LIMIT); }
  function nextPage() { doSearch(offset + LIMIT); }

  function clearAll() {
    ['f-service','f-level','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('results-inner').style.display = 'none';
    document.getElementById('empty-msg').textContent = 'run a search to see historical logs.';
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('pag').style.display = 'none';
    offset = 0;
  }
</script>
</body>
</html>
